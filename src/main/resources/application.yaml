spring:
  application:
    name: antiplagiat
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/antiplagiat}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  sql:
    init:
      mode: always
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true
  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:your-email@gmail.com}
    password: ${SPRING_MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
server:
  error:
    include-message: always
    include-stacktrace: always
logging:
  level:
    root: INFO
    com.team.antiplagiat: DEBUG
    org.springframework.security: TRACE
  config: classpath:monitoring/logback-spring.xml
app:
  solution:
    max-attempts: 50
  contest:
    max-duration-hours: 5
  security:
    enabled: ${APP_SECURITY_ENABLED:false}
    user-provider: ${APP_SECURITY_USER_PROVIDER:database}
    memory:
      username: ${APP_SECURITY_MEMORY_USERNAME:admin}
      password: ${APP_SECURITY_MEMORY_PASSWORD:admin}
      roles: ${APP_SECURITY_MEMORY_ROLES:ADMIN}
    jwt:
      secret: ${APP_SECURITY_JWT_SECRET:dev-secret-change-me}
      expiration-seconds: ${APP_SECURITY_JWT_EXPIRATION_SECONDS:86400}
management:
  endpoints:
    web:
      exposure:
        include: prometheus,health,info,metrics
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true