spring:
  application:
    name: antiplagiat
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/antiplagiat}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  sql:
    init:
      mode: always
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
server:
  error:
    include-message: always
    include-stacktrace: always
logging:
  level:
    root: INFO
    org.springframework: INFO
    com.team.antiplagiat: DEBUG
    org.springframework.security: DEBUG
  config: classpath:monitoring/logback-spring.xml
app:
  solution:
    max-attempts: 50
  zip-import:
    max-files: 1000
    max-entry-size: 5MB
  contest:
    max-duration-hours: 5
  resend:
    enabled: ${RESEND_ENABLED:false}
    api-key: ${RESEND_API_KEY:}
    from: ${RESEND_FROM_EMAIL:onboarding@resend.dev}
    base-url: ${APP_BASE_URL:http://localhost:8080/api}
  security:
    enabled: ${APP_SECURITY_ENABLED:false}
    user-provider: ${APP_SECURITY_USER_PROVIDER:database}
    memory:
      username: ${APP_SECURITY_MEMORY_USERNAME:admin}
      password: ${APP_SECURITY_MEMORY_PASSWORD:admin}
      roles: ${APP_SECURITY_MEMORY_ROLES:ADMIN}
    jwt:
      secret: ${APP_SECURITY_JWT_SECRET:dev-secret-change-me}
      expiration-seconds: ${APP_SECURITY_JWT_EXPIRATION_SECONDS:86400}
management:
  endpoints:
    web:
      exposure:
        include: prometheus,health,info,metrics
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true