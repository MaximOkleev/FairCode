global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'antiplagiat-monitor'

scrape_configs:
  - job_name: antiplagiat
    metrics_path: /actuator/prometheus
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets:
          - host.docker.internal:8080
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

# Сбор метрик с дополнительной информацией
# Метрики для бизнес-аналитики и мониторинга приложения
