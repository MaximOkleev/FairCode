version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: testdb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  qwerty:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - postgres
volumes:
  postgres_data:
