services:

  postgres:
    image: postgres:15-alpine
    container_name: antiplagiat-db

    restart: unless-stopped

    environment:
      POSTGRES_DB: antiplagiat
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d antiplagiat" ]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .

    container_name: antiplagiat-app

    restart: unless-stopped

    depends_on:
      - postgres
      - mailhog

    ports:
      - "8080:8080"

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/antiplagiat
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres

      SPRING_JPA_HIBERNATE_DDL_AUTO: update

      # Mail
      SPRING_MAIL_HOST: mailhog
      SPRING_MAIL_PORT: 1025
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "false"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: "false"

      # Security
      APP_SECURITY_ENABLED: "false"
      APP_SECURITY_USER_PROVIDER: database

      # Monitoring
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,prometheus
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: always
      MANAGEMENT_PROMETHEUS_METRICS_EXPORT_ENABLED: "true"

      # Custom app properties
      MAX_ATTEMPTS: 100
      MAX_DURATION_HOURS: 8

    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health" ]
      interval: 15s
      timeout: 5s
      retries: 10

  prometheus:
    image: prom/prometheus:latest
    container_name: antiplagiat-prometheus

    restart: unless-stopped

    depends_on:
      app:
        condition: service_healthy

    ports:
      - "9090:9090"

    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"

  grafana:
    image: grafana/grafana:latest
    container_name: antiplagiat-grafana

    restart: unless-stopped

    depends_on:
      - prometheus

    ports:
      - "3000:3000"

    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin

    volumes:
      - grafana_data:/var/lib/grafana

  mailhog:
    image: mailhog/mailhog:latest
    container_name: antiplagiat-mailhog

    restart: unless-stopped

    ports:
      - "1025:1025"  # SMTP port
      - "8025:8025"  # Web UI port

volumes:
  postgres_data:
  prometheus_data:
  grafana_data: