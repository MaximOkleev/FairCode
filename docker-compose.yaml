services:  # Раздел с описанием сервисов (контейнеров)

  postgres:  # Сервис базы данных PostgreSQL
    image: postgres:15-alpine  # Используется официальный образ PostgreSQL 15 на базе Alpine (лёгкий образ)
    container_name: antiplagiat-db  # Явное имя контейнера (удобно для логов и exec)

    environment:  # Переменные окружения для инициализации БД
      POSTGRES_DB: antiplagiat          # Имя базы данных, создаваемой при первом запуске
      POSTGRES_USER: postgres           # Пользователь базы данных
      POSTGRES_PASSWORD: postgres       # Пароль пользователя

    ports:
      - "5432:5432"  # Проброс порта: <порт_хоста>:<порт_контейнера>
      # Позволяет подключаться к БД с хоста через localhost:5432

    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Монтирование volume:
      # postgres_data — именованный volume
      # /var/lib/postgresql/data — директория хранения данных PostgreSQL внутри контейнера
      # Обеспечивает сохранность данных при перезапуске контейнера

    healthcheck:  # Проверка готовности сервиса
      test: [ "CMD-SHELL", "pg_isready -U postgres -d antiplagiat" ]
      # Команда проверки:
      # pg_isready — утилита PostgreSQL
      # Проверяет, принимает ли сервер подключения

      interval: 5s  # Интервал между проверками
      timeout: 5s   # Максимальное время ожидания ответа
      retries: 5    # Количество попыток до признания контейнера unhealthy

  app:  # Сервис Spring Boot приложения
    build: .  # Сборка образа из Dockerfile в текущей директории
    container_name: antiplagiat-app  # Явное имя контейнера

    ports:
      - "8080:8080"
      # Проброс порта:
      # Приложение будет доступно по http://localhost:8080

    environment:  # Переменные окружения для Spring Boot
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/antiplagiat
      # JDBC URL подключения к БД
      # Важно: используется имя сервиса "postgres" как hostname
      # Docker Compose создаёт внутреннюю сеть,
      # и сервисы могут обращаться друг к другу по имени

      SPRING_DATASOURCE_USERNAME: postgres   # Пользователь БД
      SPRING_DATASOURCE_PASSWORD: postgres   # Пароль БД

      # Spring Security Configuration
      # По умолчанию Security ОТКЛЮЧЕНА для docker (dev mode)
      # Для production: измените на true и используйте secrets management
      APP_SECURITY_ENABLED: "false"                    # Отключить security (dev mode)
      APP_SECURITY_USER_PROVIDER: database             # Использовать database users когда включена
      # APP_SECURITY_MEMORY_USERNAME: admin            # in-memory user (не используется, security disabled)
      # APP_SECURITY_MEMORY_PASSWORD: admin            # in-memory password

      maxAttempts: 100           # Пользовательская переменная (используется в приложении как maxAttemptsPerTask)
      maxDurationHours: 8       # Пользовательская переменная (используется в приложении как maxDurationHours)

    depends_on:
      postgres:
        condition: service_healthy
        # Гарантирует, что контейнер app запустится
        # только после успешного прохождения healthcheck у postgres
        # Важно: это НЕ гарантирует логическую готовность БД,
        # но гарантирует, что контейнер запущен и отвечает

  prometheus:
    image: prom/prometheus:latest
    container_name: antiplagiat-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    container_name: antiplagiat-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  # Объявление именованного volume
  # Docker создаёт его автоматически при первом запуске
  # Используется для постоянного хранения данных PostgreSQL
  prometheus_data:
  grafana_data:
